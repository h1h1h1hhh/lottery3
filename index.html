<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:30px;max-width:360px;width:100%;text-align:center}
h1{font-size:1.4em;color:#ffd700;margin-bottom:20px}
input{width:100%;padding:12px 18px;border-radius:30px;border:2px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:#fff;font-size:1.1em;text-align:center;margin:12px 0;outline:none}
input:focus{border-color:#ffd700}
.btn{padding:14px 40px;border:none;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033;margin:12px 0}
.btn:disabled{opacity:.4;pointer-events:none}
.result{margin-top:15px;font-size:1.1em}
.win{color:#ffd700;font-size:1.4em;font-weight:bold}
.lose{color:#aaa}
.prize{color:#ffd700;font-size:1em;margin-top:5px}
.ended{color:#f66;font-size:1.2em;font-weight:bold}
</style>
</head>
<body>
<div class="card">
  <h1>🎰 幸运抽奖</h1>
  <div id="content">
    <input id="nameInput" placeholder="请输入你的名字">
    <br><button class="btn" id="btn" onclick="go()">🎯 抽奖</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery3/contents/state.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {name:'🥇 一等奖',prize:'燕京啤酒2箱+凤仪湾门票×2+电饭煲1台',count:1,rate:.10},
  {name:'🥈 二等奖',prize:'啤酒1箱+凤仪湾门票1张+电风扇1把',count:3,rate:.30},
  {name:'🥉 三等奖',prize:'啤酒6瓶+凤仪湾门票1张',count:5,rate:.60},
];
let W={0:[],1:[],2:[]},sha='',me='',busy=false,ended=false;

function enc(s){const u=new TextEncoder().encode(s);return btoa(String.fromCharCode(...u));}
function dec(b){const bin=atob(b);const u=new Uint8Array([...bin].map(c=>c.charCodeAt(0)));return new TextDecoder().decode(u);}

async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;
    const s=JSON.parse(dec(d.content));
    W=s.winners||{0:[],1:[],2:[]};ended=s.ended||false;
  }catch(e){console.error(e);}
}

async function save(){
  const s={winners:W,ended};
  const body=JSON.stringify({message:'r',content:enc(JSON.stringify(s)),sha});
  const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body});
  const d=await r.json();sha=d.content.sha;
}

function totalWon(){return Object.values(W).flat().length;}
function totalAll(){return 9;}

async function go(){
  if(busy)return;
  if(localStorage.getItem('lot3_done')){
    document.getElementById('result').innerHTML='<p class="lose">每人只能抽一次哦</p>';return;
  }
  const n=document.getElementById('nameInput').value.trim();
  if(!n){document.getElementById('result').innerHTML='<p class="lose">请输入名字</p>';return}
  me=n;busy=true;
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='抽奖中...';

  await load();
  if(ended||totalWon()>=totalAll()){
    showEnd();busy=false;return;
  }
  if(Object.values(W).flat().includes(me)){
    let p='';R.forEach((r,i)=>{if(W[i].includes(me))p=r.prize;});
    showWin(me,p);busy=false;return;
  }

  await new Promise(r=>setTimeout(r,1500+Math.random()*1500));
  await load();

  if(totalWon()>=totalAll()){showEnd();busy=false;return;}

  const won=totalWon();
  const remain=totalAll()-won;
  const estRemain=Math.max(50-won,remain);
  const winRate=Math.min(remain/estRemain,.6);

  if(Math.random()<winRate){
    const rnd=Math.random();let tier=-1,cum=0;
    for(let i=0;i<R.length;i++){
      if(W[i].length>=R[i].count)continue;
      cum+=R[i].rate;
      if(rnd<cum){tier=i;break;}
    }
    if(tier<0) tier=2;
    W[tier].push(me);
    if(totalWon()>=totalAll()) ended=true;
    await save();
    localStorage.setItem('lot3_done','1');
    showWin(me,R[tier].prize);
  }else{
    localStorage.setItem('lot3_done','1');
    showLose();
  }
  busy=false;
}

function showWin(name,prize){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="win">恭喜 '+name+'！</p><p class="prize">'+prize+'</p><p style="color:#aaa;font-size:.85em;margin-top:15px">请到领奖处领取</p>';
}
function showLose(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">😢</p><p class="lose">很遗憾，没有中奖</p>';
}
function showEnd(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="ended">抽奖已结束</p><p style="color:#aaa;margin-top:10px">所有奖品已抽完</p>';
}
load();
</script>
</body>
</html>
